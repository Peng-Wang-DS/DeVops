name: Production Demand Forecasting CICD

on:
  push:
    branches: [main]

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    environment: DockerHub_Public
    steps:
      - name: clone code to github_actions
        uses: actions/checkout@v7

      - name: docker login
        uses: docker/login-action@v4
        with: 
          username: ${{secrets.DOCKERHUB_USERNAME}}
          passward: ${{secrets.DOCKERHUB_TOKEN}}

      - name: build image
        run: |
          docker build -t ${{secrets.DOCKERHUB_USERNAME}}/${{secrets.DOCKERHUB_REPO}}:latest
          docker push ${{secrets.DOCKERHUB_USERNAME}}/${{secrets.DOCKERHUB_REPO}}:latest



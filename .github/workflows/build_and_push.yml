name: build_and_push_cicd

on: 
  push: 
    branches: [main]

jobs:
  templating:
    runs-on: ubuntu-latest
    environment: DockerHub_Public
    steps:
      - uses: actions/checkout@v7

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: image build and push to public
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/${{secrets.DOCKERHUB_REPO}}:demo .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{secrets.DOCKERHUB_REPO}}:demo

